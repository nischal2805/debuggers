version: "3.9"

services:
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: neuraldsa_piston
    restart: unless-stopped
    privileged: true
    expose:
      - "2000"
    networks:
      - neuraldsa
    tmpfs:
      - /piston/jobs
    ulimits:
      stack: 67108864
      memlock: -1

  backend:
    build: ./backend
    container_name: neuraldsa_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:80,http://localhost}
      LLM_PROVIDER: ${LLM_PROVIDER:-bedrock}
      DEMO_MODE: ${DEMO_MODE:-false}
      # Piston runs in Docker network — backend auto-installs runtimes on startup
      PISTON_URL: http://piston:2000
      # Judge0 cloud fallback if Piston unavailable
      JUDGE0_URL: ${JUDGE0_URL:-https://ce.judge0.com}
    ports:
      - "8000:8000"
    expose:
      - "8000"
    depends_on:
      - piston
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - neuraldsa

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
        - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
        - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:8000}
    container_name: neuraldsa_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - neuraldsa

networks:
  neuraldsa:
    driver: bridge
